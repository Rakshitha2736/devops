<!DOCTYPE html>
<html>
<head>
    <title>Smart Gadget Store</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
        }
        .product {
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            width: 250px;
            box-shadow: 0px 0px 10px gray;
        }
        button {
            background-color: green;
            color: white;
            padding: 8px 15px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>Smart Gadget Store 🛍️</h1>
    <p>Buy latest gadgets easily!</p>
</header>

<div class="product">
    <h2>Smart Watch</h2>
    <p>Price: ₹1999</p>
    <button>Buy Now</button>
</div>

<div class="product">
    <h2>Wireless Earbuds</h2>
    <p>Price: ₹1499</p>
    <button>Buy Now</button>
</div>

<div class="product">
    <h2>Bluetooth Speaker</h2>
    <p>Price: ₹999</p>
    <button>Buy Now</button>
</div>

<footer>
    <p>© 2026 Smart Store | Deployed using Jenkins</p>
</footer>

</body>
</html>
